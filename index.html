<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Victor Smart Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Victor Smart Tip Calculator</h1>

    <div class="input-group">
        <label>Bill Amount</label>
        <input type="number" id="bill" placeholder="Enter amount">
    </div>

    <div class="input-group">
        <label>Number of People</label>
        <input type="number" id="people" value="1" min="1">
    </div>

    <div class="input-group">
        <label>Service Rating</label>
        <select id="service">
                    <option value="0.05">Good (5%)</option>
            <option value="0.1">Good (10%)</option>
            <option value="0.15">Great (15%)</option>
            <option value="0.2">Excellent (20%)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Custom Tip (5%)</label>
        <input type="range" id="tipRange" min="0" max="30" value="0.05">
        <span id="tipValue">5%</span>
    </div>

    <div class="result">
        <h2>Tip: <span id="tipAmount">₦0.00</span></h2>
        <h2>Total per person: <span id="totalPerPerson">₦0.00</span></h2>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
